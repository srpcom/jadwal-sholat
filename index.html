<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Sholat • RSUD dr. R. Koesma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-100">
    <div class="max-w-md mx-auto p-6">
        <!-- Header -->
        <div class="bg-emerald-700 text-white rounded-3xl p-6 mb-6 shadow-lg text-center">
            <i class="fa-solid fa-mosque text-4xl mb-3"></i>
            <h1 class="text-2xl font-bold">Jadwal Sholat</h1>
            <p class="text-emerald-200 mt-1">RSUD dr. R. Koesma</p>
            <p class="text-emerald-300 text-sm">Tuban, Jawa Timur</p>
        </div>

        <!-- Form -->
        <div class="bg-white rounded-3xl shadow p-6 mb-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Tanggal</label>
                <input type="date" id="tanggal" 
                       class="w-full border border-gray-300 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-emerald-500">
            </div>

            <button onclick="getJadwalSholat()"
                    class="mt-4 w-full bg-emerald-600 hover:bg-emerald-700 transition text-white font-semibold py-3.5 px-6 rounded-2xl flex items-center justify-center gap-2">
                <i class="fa-solid fa-sync"></i>
                <span>Tampilkan Jadwal Sholat</span>
            </button>
        </div>

        <!-- Hasil -->
        <div id="hasil" class="hidden bg-white rounded-3xl shadow p-6">
            <div class="text-center mb-5">
                <h2 class="text-xl font-bold text-gray-800" id="lokasi"></h2>
                <p class="text-sm text-gray-500" id="tanggalHasil"></p>
            </div>

            <div class="space-y-3" id="jadwal"></div>
        </div>

        <div class="text-center text-xs text-gray-400 mt-6">
            Data dari API Kemenag RI
        </div>
    </div>

    <script>
        // Set tanggal hari ini
        const today = new Date();
        document.getElementById('tanggal').value = today.toISOString().split('T')[0];

        async function getJadwalSholat() {
            const tanggal = document.getElementById('tanggal').value;

            if (!tanggal) {
                alert("Silakan pilih tanggal");
                return;
            }

            const [tahun, bulan, hari] = tanggal.split('-');
            // Kota Tuban = 1406 (Khusus RSUD dr. R. Koesma)
            const url = `https://api.myquran.com/v2/sholat/jadwal/1406/${tahun}/${bulan}/${hari}`;

            try {
                const res = await fetch(url);
                const data = await res.json();

                if (data.status === true && data.data) {
                    tampilkanHasil(data.data);
                } else {
                    alert("Data tidak ditemukan");
                }
            } catch (err) {
                alert("Gagal mengambil data");
                console.error(err);
            }
        }

        function tampilkanHasil(data) {
            document.getElementById('hasil').classList.remove('hidden');
            document.getElementById('lokasi').innerText = data.lokasi;
            document.getElementById('tanggalHasil').innerText = data.jadwal.tanggal;

            const jadwal = data.jadwal;
            const html = `
                <div class="flex justify-between items-center bg-emerald-50 p-4 rounded-2xl">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-sun text-yellow-500 w-5"></i>
                        <span>Imsak</span>
                    </div>
                    <span class="font-bold text-lg">${jadwal.imsak}</span>
                </div>
                <div class="flex justify-between items-center bg-emerald-50 p-4 rounded-2xl">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-sun text-orange-500 w-5"></i>
                        <span>Subuh</span>
                    </div>
                    <span class="font-bold text-lg">${jadwal.subuh}</span>
                </div>
                <div class="flex justify-between items-center bg-emerald-50 p-4 rounded-2xl">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-sun text-yellow-600 w-5"></i>
                        <span>Dzuhur</span>
                    </div>
                    <span class="font-bold text-lg">${jadwal.dzuhur}</span>
                </div>
                <div class="flex justify-between items-center bg-emerald-50 p-4 rounded-2xl">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-sun text-orange-600 w-5"></i>
                        <span>Ashar</span>
                    </div>
                    <span class="font-bold text-lg">${jadwal.ashar}</span>
                </div>
                <div class="flex justify-between items-center bg-emerald-50 p-4 rounded-2xl">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-cloud-sun text-orange-700 w-5"></i>
                        <span>Maghrib</span>
                    </div>
                    <span class="font-bold text-lg">${jadwal.maghrib}</span>
                </div>
                <div class="flex justify-between items-center bg-emerald-50 p-4 rounded-2xl">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-moon text-indigo-600 w-5"></i>
                        <span>Isya</span>
                    </div>
                    <span class="font-bold text-lg">${jadwal.isya}</span>
                </div>
            `;
            document.getElementById('jadwal').innerHTML = html;
        }
    </script>
</body>
</html>
